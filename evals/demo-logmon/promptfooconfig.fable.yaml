# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Premium-runner pass: Claude Fable 5 ($10/$50 per M) as the system-under-test,
# on a curated 6-prompt subset, to test whether an even-stronger runner than
# Opus 4.8 saturates the suite the same way (i.e. whether prompt choice still
# matters on a top-tier model). Deliberately bounded to control spend.
description: "Fable-5-as-runner pass (curated 6 prompts) — premium-runner saturation check"

prompts:
  - id: &loader file://../../prompts/load_okf.py:load_prompt
    label: base
    config: { okf: variants/logmon/base.md }
  - id: *loader
    label: opus-4.8
    config: { okf: variants/logmon/opus.md }
  - id: *loader
    label: haiku-4.5
    config: { okf: variants/logmon/haiku.md }
  - id: *loader
    label: merged-v2
    config: { okf: variants/logmon/merged-v2.md }
  - id: *loader
    label: inkling
    config: { okf: variants/logmon/inkling.md }
  - id: *loader
    label: llama-4-scout
    config: { okf: variants/logmon/llama.md }

providers:
  - id: openrouter:anthropic/claude-fable-5
    label: fable-5-SUT
    config: { temperature: 0, max_tokens: 1000 }

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-haiku-4.5
      config: { temperature: 0 }

tests:
  - file://tests.yaml
