# Access/cost model per model, consumed by scripts/cost_report.mjs.
#
# Two things a run costs depends on HOW you reach the model:
#   - OpenRouter (metered): you pay per token at OpenRouter's live rates.
#   - A flat subscription (Claude Max, ChatGPT/Codex, Agy/Gemini): the model is
#     covered by a monthly plan, so the marginal cost of one more eval is ~$0.
#
# This file maps model-id prefixes to a subscription plan (if any). The cost
# report shows BOTH the OpenRouter metered cost of the run AND, for
# subscription-eligible models, a note that routing via the subscription makes
# the marginal cost ~$0. Live per-token prices are fetched from OpenRouter's
# public /models API at report time — not hard-coded here (they drift).

subscriptions:
  # prefix (matched against the model id, e.g. "anthropic/claude-opus-4.8")
  - prefix: "anthropic/claude-opus"
    plan: "Claude Max subscription"
  - prefix: "anthropic/claude-haiku"
    plan: "Claude Max subscription"
  - prefix: "anthropic/claude-sonnet"
    plan: "Claude Max subscription"
  - prefix: "anthropic/claude-fable"
    plan: "Claude Max subscription"
  - prefix: "openai/gpt-5"        # gpt-5.x / codex — ChatGPT/Codex plan
    plan: "ChatGPT / Codex subscription"
  - prefix: "google/gemini"       # Agy = Antigravity/Gemini front-end
    plan: "Agy / Gemini subscription"
  # Everything else (deepseek, qwen, meta-llama, openai/gpt-oss, thinkingmachines)
  # has no consumer subscription here -> OpenRouter metered only.
